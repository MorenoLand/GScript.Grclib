name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
          - arch: x86
            cmake_arch: Win32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -A ${{ matrix.cmake_arch }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grclib-windows-${{ matrix.arch }}
          path: build/Release/grclib.dll
          if-no-files-found: error

  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cxx_flags: ""
            linker_flags: ""
            packages: ""
          - arch: x86
            cxx_flags: "-m32"
            linker_flags: "-m32"
            packages: "gcc-multilib g++-multilib"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 32-bit toolchain
        if: matrix.packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}"
          -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.linker_flags }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grclib-linux-${{ matrix.arch }}
          path: build/grclib.so
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            osx_architectures: x86_64
          - arch: arm64
            runner: macos-14
            osx_architectures: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_architectures }}

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grclib-macos-${{ matrix.arch }}
          path: build/grclib.dylib
          if-no-files-found: error

  release:
    name: Release
    needs: [windows, linux, macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release version
        id: version
        shell: bash
        run: |
          version=$(sed -nE "s/^project\\(grclib VERSION ([0-9]+)\\.([0-9]+)\\..*/v\\1.\\2.${GITHUB_RUN_NUMBER}/p" CMakeLists.txt)
          if [ -z "$version" ]; then
            echo "Could not read project version from CMakeLists.txt" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package release assets
        shell: bash
        run: |
          mkdir -p release-assets
          for artifact in dist/*; do
            name=$(basename "$artifact")
            (cd "$artifact" && zip -r "../../release-assets/${name}.zip" .)
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: grclib ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/*.zip
